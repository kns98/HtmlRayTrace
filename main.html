<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ray-Traced Cube Only</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050608;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>
<canvas id="rayCanvas"></canvas>

<script>
(() => {
  // ============================================================
  // Vec3
  // ============================================================
  class Vec3 {
    constructor(x = 0, y = 0, z = 0) {
      this.x = x;
      this.y = y;
      this.z = z;
    }

    add(v) { return new Vec3(this.x + v.x, this.y + v.y, this.z + v.z); }
    sub(v) { return new Vec3(this.x - v.x, this.y - v.y, this.z - v.z); }
    mul(v) {
      if (typeof v === "number") return new Vec3(this.x * v, this.y * v, this.z * v);
      return new Vec3(this.x * v.x, this.y * v.y, this.z * v.z);
    }
    div(s) { return new Vec3(this.x / s, this.y / s, this.z / s); }
    dot(v) { return this.x * v.x + this.y * v.y + this.z * v.z; }
    cross(v) {
      return new Vec3(
        this.y * v.z - this.z * v.y,
        this.z * v.x - this.x * v.z,
        this.x * v.y - this.y * v.x
      );
    }
    length() { return Math.sqrt(this.dot(this)); }
    normalize() {
      const len = this.length();
      return len > 1e-8 ? this.div(len) : new Vec3(0, 0, 0);
    }
    clamp01() {
      return new Vec3(
        Math.min(1, Math.max(0, this.x)),
        Math.min(1, Math.max(0, this.y)),
        Math.min(1, Math.max(0, this.z))
      );
    }
    static zero() { return new Vec3(0, 0, 0); }
  }

  // ============================================================
  // Ray / Material / Triangle
  // ============================================================
  class Ray {
    constructor(origin, direction) {
      this.origin = origin;
      this.direction = direction.normalize();
    }
  }

  class Material {
    constructor(color) {
      this.color = color;
    }
  }

  class Triangle {
    constructor(v0, v1, v2, material) {
      this.v0 = v0;
      this.v1 = v1;
      this.v2 = v2;
      this.material = material;

      this.edge1 = v1.sub(v0);
      this.edge2 = v2.sub(v0);
      this.normal = this.edge1.cross(this.edge2).normalize();
    }

    intersect(ray, tMin = 0.001, tMax = Infinity) {
      // Möller–Trumbore ray/triangle intersection
      const EPS = 1e-8;
      const h = ray.direction.cross(this.edge2);
      const a = this.edge1.dot(h);
      if (Math.abs(a) < EPS) return null;

      const f = 1.0 / a;
      const s = ray.origin.sub(this.v0);
      const u = f * s.dot(h);
      if (u < 0 || u > 1) return null;

      const q = s.cross(this.edge1);
      const v = f * ray.direction.dot(q);
      if (v < 0 || u + v > 1) return null;

      const t = f * this.edge2.dot(q);
      if (t <= tMin || t >= tMax) return null;

      return { t, triangle: this };
    }
  }

  // ============================================================
  // Cube Scene: cube triangles only. No floor, wall, panel, text, UI.
  // ============================================================
  function buildCubeOnlyScene() {
    const red     = new Material(new Vec3(1.00, 0.02, 0.02)); // front
    const cyan    = new Material(new Vec3(0.00, 0.90, 0.95)); // back
    const green   = new Material(new Vec3(0.10, 0.85, 0.00)); // left
    const blue    = new Material(new Vec3(0.02, 0.20, 1.00)); // right
    const yellow  = new Material(new Vec3(1.00, 0.92, 0.00)); // top
    const magenta = new Material(new Vec3(0.85, 0.00, 0.78)); // bottom

    const s = 1.0;
    const v = {
      fbl: new Vec3(-s, -s,  s),
      fbr: new Vec3( s, -s,  s),
      ftr: new Vec3( s,  s,  s),
      ftl: new Vec3(-s,  s,  s),
      bbl: new Vec3(-s, -s, -s),
      bbr: new Vec3( s, -s, -s),
      btr: new Vec3( s,  s, -s),
      btl: new Vec3(-s,  s, -s)
    };

    const triangles = [];
    const addQuad = (a, b, c, d, mat) => {
      triangles.push(new Triangle(a, b, c, mat));
      triangles.push(new Triangle(a, c, d, mat));
    };

    // Winding is chosen so normals face outward.
    addQuad(v.fbl, v.fbr, v.ftr, v.ftl, red);       // front, +Z
    addQuad(v.bbr, v.bbl, v.btl, v.btr, cyan);      // back, -Z
    addQuad(v.bbl, v.fbl, v.ftl, v.btl, green);     // left, -X
    addQuad(v.fbr, v.bbr, v.btr, v.ftr, blue);      // right, +X
    addQuad(v.ftl, v.ftr, v.btr, v.btl, yellow);    // top, +Y
    addQuad(v.fbl, v.bbl, v.bbr, v.fbr, magenta);   // bottom, -Y

    return triangles;
  }

  const scene = buildCubeOnlyScene();

  function intersectScene(ray) {
    let closest = null;
    let closestT = Infinity;

    for (const tri of scene) {
      const hit = tri.intersect(ray, 0.001, closestT);
      if (hit) {
        closest = hit;
        closestT = hit.t;
      }
    }

    return closest;
  }

  // ============================================================
  // Camera
  // ============================================================
  class Camera {
    constructor() {
      this.target = new Vec3(0, 0, 0);
      this.radius = 4.5;
      this.theta = 1.18;
      this.phi = 0.72;
      this.fov = 45 * Math.PI / 180;
      this.update();
    }

    update() {
      const x = this.radius * Math.sin(this.theta) * Math.sin(this.phi);
      const y = this.radius * Math.cos(this.theta);
      const z = this.radius * Math.sin(this.theta) * Math.cos(this.phi);

      this.position = new Vec3(x, y, z);
      this.forward = this.target.sub(this.position).normalize();
      this.right = this.forward.cross(new Vec3(0, 1, 0)).normalize();
      this.up = this.right.cross(this.forward).normalize();
    }

    getRay(u, v, aspect) {
      const scale = Math.tan(this.fov * 0.5);
      const px = (2 * u - 1) * aspect * scale;
      const py = (1 - 2 * v) * scale;
      const dir = this.forward.add(this.right.mul(px)).add(this.up.mul(py)).normalize();
      return new Ray(this.position, dir);
    }
  }

  const camera = new Camera();

  // ============================================================
  // Ray-traced shading
  // ============================================================
  function shade(ray) {
    const hit = intersectScene(ray);

    if (!hit) {
      // Dark studio background only; this is not geometry.
      const t = 0.5 * (ray.direction.y + 1.0);
      return new Vec3(0.015, 0.017, 0.022).mul(1 - t).add(new Vec3(0.055, 0.06, 0.075).mul(t));
    }

    const tri = hit.triangle;
    const point = ray.origin.add(ray.direction.mul(hit.t));
    let n = tri.normal;
    if (n.dot(ray.direction) > 0) n = n.mul(-1);

    // Analytic studio lights: no visible light objects, so the rendered scene remains cube-only.
    const keyDir = new Vec3(-0.45, 0.85, 0.35).normalize();
    const fillDir = new Vec3(0.85, 0.30, 0.55).normalize();
    const rimDir = new Vec3(-0.2, 0.25, -1.0).normalize();

    const key = Math.max(0, n.dot(keyDir)) * 0.95;
    const fill = Math.max(0, n.dot(fillDir)) * 0.28;
    const rim = Math.pow(Math.max(0, n.dot(rimDir)), 2.0) * 0.22;
    const ambient = 0.20;

    // Tiny normal-based edge darkening for dimensionality.
    const view = ray.direction.mul(-1).normalize();
    const fresnel = Math.pow(1 - Math.max(0, n.dot(view)), 3.0) * 0.18;

    let light = ambient + key + fill + rim + fresnel;

    // Subtle contact-like darkening at lower faces using actual hit point, not extra geometry.
    const lower = Math.max(0, (-point.y + 0.45) * 0.12);
    light = Math.max(0, light - lower);

    return tri.material.color.mul(light).clamp01();
  }

  // ============================================================
  // Progressive renderer
  // ============================================================
  const canvas = document.getElementById("rayCanvas");
  const ctx = canvas.getContext("2d", { alpha: false });

  let width = 0;
  let height = 0;
  let renderWidth = 0;
  let renderHeight = 0;
  let accum = [];
  let samples = 0;
  let needsReset = true;
  let dragging = false;
  let lastX = 0;
  let lastY = 0;

  function resetAccumulation() {
    // Cap internal resolution for responsive progressive ray tracing.
    const maxInternalWidth = 720;
    const dpr = Math.min(2, window.devicePixelRatio || 1);

    width = Math.floor(window.innerWidth * dpr);
    height = Math.floor(window.innerHeight * dpr);

    const scale = Math.min(1, maxInternalWidth / width);
    renderWidth = Math.max(1, Math.floor(width * scale));
    renderHeight = Math.max(1, Math.floor(height * scale));

    canvas.width = renderWidth;
    canvas.height = renderHeight;

    accum = new Array(renderWidth * renderHeight);
    for (let i = 0; i < accum.length; i++) accum[i] = Vec3.zero();

    samples = 0;
    needsReset = false;
  }

  function toneMap(c) {
    // Reinhard + gamma correction
    let r = c.x;
    let g = c.y;
    let b = c.z;
    const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    const scale = 1.0 / (1.0 + lum);
    r = Math.pow(Math.max(0, r * scale), 1 / 2.2);
    g = Math.pow(Math.max(0, g * scale), 1 / 2.2);
    b = Math.pow(Math.max(0, b * scale), 1 / 2.2);
    return new Vec3(r, g, b).clamp01();
  }

  function renderFrame() {
    if (needsReset) resetAccumulation();

    const aspect = renderWidth / renderHeight;
    const image = ctx.createImageData(renderWidth, renderHeight);

    for (let y = 0; y < renderHeight; y++) {
      for (let x = 0; x < renderWidth; x++) {
        const idx = y * renderWidth + x;

        // Progressive jittered anti-aliasing.
        const u = (x + Math.random()) / renderWidth;
        const v = (y + Math.random()) / renderHeight;
        const ray = camera.getRay(u, v, aspect);
        const color = shade(ray);

        accum[idx] = accum[idx].add(color);
        const avg = accum[idx].div(samples + 1);
        const mapped = toneMap(avg);

        const offset = idx * 4;
        image.data[offset] = Math.floor(mapped.x * 255);
        image.data[offset + 1] = Math.floor(mapped.y * 255);
        image.data[offset + 2] = Math.floor(mapped.z * 255);
        image.data[offset + 3] = 255;
      }
    }

    samples++;
    ctx.putImageData(image, 0, 0);
    requestAnimationFrame(renderFrame);
  }

  window.addEventListener("resize", () => {
    needsReset = true;
  });

  canvas.addEventListener("mousedown", (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });

  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;

    camera.phi -= dx * 0.008;
    camera.theta += dy * 0.008;
    camera.theta = Math.max(0.25, Math.min(Math.PI - 0.25, camera.theta));
    camera.update();
    needsReset = true;
  });

  window.addEventListener("mouseup", () => {
    dragging = false;
  });

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    camera.radius += e.deltaY * 0.004;
    camera.radius = Math.max(2.7, Math.min(8.0, camera.radius));
    camera.update();
    needsReset = true;
  }, { passive: false });

  resetAccumulation();
  renderFrame();
})();
</script>
</body>
</html>
